<!DOCTYPE html>
<html>
<head>
    <title>MindCare</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="card">

    <button onclick="toggleDark()" class="dark-btn">🌙</button>

    <h2>🌿 MindCare</h2>
    <p>Quick Mental Check</p>

    <!-- QUESTIONS -->
    <label>Anxious?</label>
    <select id="q1"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Sleep issues?</label>
    <select id="q2"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Feeling low?</label>
    <select id="q3"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Tired?</label>
    <select id="q4"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Irritated?</label>
    <select id="q5"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Social avoidance?</label>
    <select id="q6"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Low focus?</label>
    <select id="q7"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Appetite change?</label>
    <select id="q8"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Overwhelmed?</label>
    <select id="q9"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <label>Can't relax?</label>
    <select id="q10"><option value="0">No</option><option value="1">Sometimes</option><option value="2">Often</option></select>

    <!-- SLEEP -->
    <label>😴 Sleep hours</label>
    <input type="number" id="sleep" placeholder="Enter hours (e.g. 6)">

    <button onclick="analyze()">Analyze</button>

    <div class="bar">
        <div id="progress"></div>
    </div>

</div>

<!-- CHATBOT -->
<div class="chatbox">
    <h3>🤖 MindBot</h3>
    <input type="text" id="userInput" placeholder="Talk to me...">
    <button onclick="chat()">Send</button>
    <p id="botReply"></p>
</div>

<!-- LOADER -->
<div id="loader" class="loader">Analyzing...</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <h3 id="result"></h3>
    <p id="advice"></p>
</div>

<!-- GRAPH -->
<canvas id="chartCanvas"></canvas>

<!-- SOUNDS -->
<audio id="alertSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
<audio id="calmSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<!-- NAVBAR -->
<div class="navbar">
    <span>🏠 Home</span>
    <span>📊 Report</span>
    <span>👤 Profile</span>
</div>

<script src="script.js"></script>

</body>
</html>
